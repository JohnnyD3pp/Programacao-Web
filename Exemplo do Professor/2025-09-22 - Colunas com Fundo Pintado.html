<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução a Colunas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>
        img {
            max-width: 100%;
        }

		.cartao-imagem, .cartao {
			padding: 12px;
			border-radius: 6px;
			min-height: 100%;
		}

		.cartao {
			background-color: red;
		}

		.cartao-imagem {
			background-position: center center;
			background-image: url('https://img.freepik.com/vetores-gratis/ilustracao-de-anime-kawaii-desenhada-a-mao_23-2150559292.jpg?semt=ais_hybrid&w=740&q=80');
			background-size: cover;
			padding-top: 250px;
		}

		.ajuste-coluna {
			padding-top: 12px;
			padding-bottom: 12px;
		}
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">

            <div class="col-6">
				<div>
					<h1>Coluna 1</h1>
					<p>Teste 1</p>
				</div>
            </div>

            <div class="col-6">
				<div>
					<h1>Coluna 2</h1>
					<p>Teste 2</p>
				</div>
            </div>

        </div>

        <div class="row">

            <div class="col-sm-6 col-lg-3 ajuste-coluna">
				<div class="cartao">
					<h1>Coluna SM/LG 1</h1>
					<p>Teste 1</p>
				</div>
            </div>

            <div class="col-sm-6 col-lg-3 ajuste-coluna">
				<div class="cartao">
					<h1>Coluna SM/LG 2</h1>
					<p>Teste 2</p>
					<img width="300" src="https://img.freepik.com/vetores-gratis/ilustracao-de-anime-kawaii-desenhada-a-mao_23-2150559292.jpg?semt=ais_hybrid&w=740&q=80" />
				</div>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 ajuste-coluna">
				<div class="cartao-imagem">
					<h1>Coluna MD 1</h1>
					<p>Teste 1</p>
				</div>
            </div>

            <div class="col-md-6 ajuste-coluna">
				<div class="cartao-imagem">
					<h1>Coluna MD 2</h1>
					<p>Teste 2</p>
				</div>
            </div>

        </div>

        <div class="row">

            <div class="col-lg-6">
                <h1>Coluna LG 1</h1>
                <p>Teste 1</p>
            </div>

            <div class="col-lg-6">
                <h1>Coluna LG 2</h1>
                <p>Teste 2</p>
            </div>

        </div>
    </div>

</body>
</html>
