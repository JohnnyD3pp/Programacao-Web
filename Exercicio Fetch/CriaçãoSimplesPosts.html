<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fetch - Criação Simples</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>

    .body {
        font-family: sans-serif;
        margin: 0px;
    }

    .img {
		max-width: 100%;
	}

        .secao{
            background-image: url('https://comparegames.com.br/_next/image?url=https%3A%2F%2Fmedia.graphassets.com%2FTVKLqpcNSgOrGxIUoDVA&w=3840&q=100');
            background-repeat: no-repeat;
			background-position: center;
			background-size: cover;
			background-attachment: fixed;
            padding: 100px;
            color: rgb(0, 0, 0);
        }

		.titulo{
			color: rgb(0, 0, 0);
			font-weight: bold;
			text-decoration: underline;
		}

    </style>

</head>
<body>

<div class="secao">

	<div class="card" style="width: 18rem;">
  <div class="card-header">
    <img src='https://preview.redd.it/heres-mario-party-4-boo-with-a-transparent-background-if-v0-kzx3l1x4y8ue1.png?width=640&crop=smart&auto=webp&s=109cde428c9ec524ce7b58ea12f54ab5a80c4a0d' width="45" />
	<span class="titulo">Cadastro de posts</span>
  </div>
  <ul class="list-group list-group-flush">
    <li class="list-group-item"><label for="inputTitulo">Titulo</label>
								<input type="text" id="inputTitulo" /></li>

    <li class="list-group-item"><label for="inputBody">Body</label>
								<input type="text" id="inputBody" /></li>

    <li class="list-group-item"><label for="inputUserId">UserId</label>
								<input type="int" id="inputUserId" /></li>

	<li class="list-group-item"><button type="button" onclick="listarPost()">
								Criar Post
								</button></li>
  </ul>

</div>

	<script type="text/javascript">

		async function listarPost() {

			let inputtitle = document.getElementById("inputTitulo");
			let inputbody = document.getElementById("inputBody");
			let inputuserid = document.getElementById("inputUserId");

			let title = inputtitle.value;
			let body = inputbody.value;
			let userid = parseInt(inputuserid.value); // Como o valor é int, temos que converter para int

			if (!title) {
				alert("Título inválido!");
				return;
			}

			if (!body) {
				alert("Body inválido!");
				return;
			}

            if (!userid) {
				alert("Id de usuário inválido!");
				return;
			}

			let post = {
				'title': title, // O que está dentro do parênteses tem que casar com a API
				'body': body, // Ou seja, ter o mesmo nome solicitado no banco
                'userId': userid,
			};

			try {

				let response = await fetch("https://jsonplaceholder.typicode.com/posts", {
					method: "POST",
					body: JSON.stringify(post),
					headers: {
						"content-type": "application/json"
					}
				});

				if (!response.ok) {
					alert("Ocorreu um erro ao registrar o post :(");
					return;
				}

				inputtitle.value = "";
				inputbody.value = "";
				inputuserid.value = "";

				alert("Post cadastrado com sucesso!");

			} catch (ex) {
				alert("Ocorreu um erro de rede ao registrar o post: " + ex.message)
			}

		}

	</script>

</div>

</body>
</html>
