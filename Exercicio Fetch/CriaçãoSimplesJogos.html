<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fetch - Criação Simples</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>

    .body {
        font-family: sans-serif;
        margin: 0px;
    }

    .img {
		max-width: 100%;
	}

        .secao{
            background-image: url('https://comparegames.com.br/_next/image?url=https%3A%2F%2Fmedia.graphassets.com%2FTVKLqpcNSgOrGxIUoDVA&w=3840&q=100');
            background-repeat: no-repeat;
			background-position: center;
			background-size: cover;
			background-attachment: fixed;
            padding: 100px;
            color: rgb(0, 0, 0);
        }

		.titulo{
			color: rgb(0, 0, 0);
			font-weight: bold;
			text-decoration: underline;
		}

    </style>

</head>
<body>

<div class="secao">

	<div class="card" style="width: 18rem;">
  <div class="card-header">
    <img src='https://preview.redd.it/heres-mario-party-4-boo-with-a-transparent-background-if-v0-kzx3l1x4y8ue1.png?width=640&crop=smart&auto=webp&s=109cde428c9ec524ce7b58ea12f54ab5a80c4a0d' width="45" />
	<span class="titulo">Cadastro de Jogos</span>
  </div>
  <ul class="list-group list-group-flush">
    <li class="list-group-item"><label for="inputNome">Nome</label>
								<input type="text" id="inputNome" /></li>

    <li class="list-group-item"><label for="inputDescricao">Descricao</label>
								<input type="text" id="inputDescricao" /></li>

    <li class="list-group-item"><label for="inputProdutora">Produtora</label>
								<input type="text" id="inputProdutora" /></li>

  	<li class="list-group-item"><label for="inputAno">Ano</label>
								<input type="int" id="inputAno" /></li>

  	<li class="list-group-item"><label for="inputIdadeMinima">IdadeMinima</label>
								<input type="int" id="inputIdadeMinima" /></li>

	<li class="list-group-item"><button type="button" onclick="listarJogo()">
								Listar Jogos
								</button></li>
  </ul>

</div>

	<script type="text/javascript">

		async function listarJogo() {

			let inputnome = document.getElementById("inputNome");
			let inputdescricao = document.getElementById("inputDescricao");
			let inputprodutora = document.getElementById("inputProdutora");
			let inputano = document.getElementById("inputAno");
			let inputidademinima = document.getElementById("inputIdadeMinima");

			let nome = inputnome.value;
			let descricao = inputdescricao.value;
			let produtora = inputprodutora.value;
			let ano = parseInt(inputano.value); // Como o valor é int, temos que converter para int
			let idademinima = parseInt(inputidademinima.value);

			if (!nome) {
				alert("Nome inválido!");
				return;
			}

			if (!descricao) {
				alert("Descrição inválida!");
				return;
			}

            if (!produtora) {
				alert("Produtora inválida!");
				return;
			}

            if (!ano) {
				alert("Ano inválido!");
				return;
			}

            if (!idademinima) {
				alert("Idade Mínima inválida!");
				return;
			}

			let jogo = {
				'nome': nome,
				'descricao': descricao,
                'produtora': produtora,
                'ano': ano,
                'idadeMinima': idademinima
			};

			try {

				let response = await fetch("https://academico.espm.br/testeapi/jogo", {
					method: "POST",
					body: JSON.stringify(jogo),
					headers: {
						"content-type": "application/json"
					}
				});

				if (!response.ok) {
					alert("Ocorreu um erro ao registrar o jogo :(");
					return;
				}

				inputnome.value = "";
				inputdescricao.value = "";
				inputprodutora.value = "";
				inputano.value = "";
				inputidademinima.value = "";

				alert("Jogo cadastrado com sucesso!");

			} catch (ex) {
				alert("Ocorreu um erro de rede ao registrar o jogo: " + ex.message)
			}

		}

	</script>

</div>

</body>
</html>
