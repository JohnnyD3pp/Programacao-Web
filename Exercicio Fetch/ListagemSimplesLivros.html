<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fetch - Listagem Simples</title>
</head>
<body>

	<button type="button" onclick="listarLivros()">
		Listar Livros
	</button>

	<script type="text/javascript">

		async function listarLivros() {

			let response = await fetch("https://academico.espm.br/testeapi/livro/listar");

			let lista = await response.json();

			console.log("Livros cadastrados: " + lista.length);

			for (let i = 0; i < lista.length; i++) { <!-- i++ = i = i + 1 -->
				console.log("Id: " + lista[i].id);
				console.log("Nome: " + lista[i].nome);
				console.log("Autor(a): " + lista[i].autor);
                console.log("Editora: " + lista[i].editora);
                console.log("Ano: " + lista[i].ano);
			}

		}

	</script>

</body>
</html>
