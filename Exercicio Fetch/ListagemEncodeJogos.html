<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fetch - Listagem Simples</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>

		.body {
			font-family: sans-serif;
			margin: 0px;
		}

		.img {
			max-width: 100%;
		}

        .negrito{
			font-weight: bold;
			font-size: 20px;
			color: rgb(237, 4, 4);
			text-decoration: underline;
		}

		.secao{
			background-image: url('https://cdn.fondecranvip.com/2025/03/iExvJxJe-fond-decran-Minecraft-55.webp');
            background-repeat: no-repeat;
			background-position: center;
			background-size: cover;
			background-attachment: fixed;
            padding: 100px;
            color: rgb(255, 255, 255);
			font-size: 20px;
			font-weight: bold;
		}

		.card{
			background-color: transparent;
			align-items: center;
		}

    </style>
    
</head>
<body>

<div class="secao">

	<div class="card">
		<div class="card-body">
			<button type="button" onclick="listarJogo()">
			Listar Jogos
			</button>
		</div>
	</div>

    <div id="divListagem"></div>

	<script type="text/javascript">
        let regExpAmp = /\&/g, regExpLt = /</g, regExpGt = />/g;

        function encode(x) {
            return (x ? x.replace(regExpAmp, "&amp;").replace(regExpLt, "&lt;").replace(regExpGt, "&gt;") : "");
        }

		async function listarJogo() {

			let response = await fetch("https://academico.espm.br/testeapi/jogo");

			let lista = await response.json();

			let html = `<h1 class='negrito'>Jogos cadastrados: ${lista.length}</h1>`;

            for (let i = 0; i < lista.length; i++) { // Faço um html no qual vou concatenando os dados da lista
				html += `
					<hr />
					<h2>
						<i>(${lista[i].id})</i> ${encode(lista[i].nome)}
					</h2>
                    <p>
						Descricao: ${encode(lista[i].descricao)}
					</p>
                    <p>
						Produtora: ${encode(lista[i].produtora)}
					</p>
                    <p>
						Ano: ${(lista[i].ano)}
					</p>
                    <p>
						IdadeMinima: ${(lista[i].idademinima)}
					</p>
				`; // Html dinâmico, mostra o id, o nome e o email da pessoa a cada linha | <i> aparecer em itálico
			} // Não podemos usar o encode em números (id, ano e idade)

            let divListagem = document.getElementById("divListagem");

			divListagem.innerHTML = html; // O html dentro do div vai para a tela

        }

	</script>

</div>

</body>
</html>
