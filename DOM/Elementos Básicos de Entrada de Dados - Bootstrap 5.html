<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Elementos Básicos de Entrada de Dados</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>

	<div class="container-fluid">
		<div class="row">

			<div class="col-md-3">
				<div class="mb-3">
					<label for="inputTextoSimples" class="form-label">Texto Simples</label>
					<input type="text" id="inputTextoSimples" class="form-control" />
				</div>
			</div>

			<div class="col-md-3">
				<div class="mb-3">
					<label for="inputTextoNumerico" class="form-label">Texto Númerico</label>
					<input type="number" id="inputTextoNumerico" class="form-control" />
				</div>
			</div>

			<div class="col-md-3">
				<div class="mb-3">
					<label for="inputTextoData" class="form-label">Texto Data</label>
					<input type="date" id="inputTextoData" class="form-control" />
				</div>
			</div>

			<div class="col-md-3">
				<div class="mb-3">
					<label for="inputTextoSenha" class="form-label">Texto Senha</label>
					<input type="password" id="inputTextoSenha" class="form-control" />
				</div>
			</div>

		</div>

		<div class="row">

			<div class="col-md-3">
				<div class="mb-3">
					<label for="selectOpcoes" class="form-label">Menu de Opções</label>
					<select id="selectOpcoes" class="form-select">
						<option value="">Selecione...</option>
						<option value="123">Opção A</option>
						<option value="456">Opção B</option>
						<option value="789">Opção C</option>
					</select>
				</div>
			</div>

			<div class="col-md-3">
				<div class="form-check">
					<input class="form-check-input" type="checkbox" value="1" id="inputCheck">
					<label class="form-check-label" for="inputCheck">
						Caixa de Seleção
					</label>
				</div>
			</div>

			<div class="col-md-3">
				<button type="button" onclick="validarCampos()" class="btn btn-primary">Validar Campos</button>
			</div>

		</div>

	</div>

	<script type="text/javascript">

		function validarCampos() {
			// Obtenção e validação básica de campos de texto simples
			let campo = document.getElementById("inputTextoSimples");
			let valor = campo.value;

			let erros = [];

			if (!valor) {
				erros.push("Texto Simples vazio!");
			} else {
				console.log("Texto Simples: " + valor);
			}

			// Obtenção e validação básica de campos de texto númericos
			campo = document.getElementById("inputTextoNumerico");
			// Repare que o que importa é o valor numérico, não a string! :)
			valor = parseInt(campo.value);

			if (isNaN(valor)) {
				erros.push("Texto Numérico vazio!");
			} else {
				if (valor < 0 || valor > 130) {
					erros.push("Idade Inválida!");
				} else {
					console.log("Texto Numérico: " + valor);
				}
			}

			// Obtenção e validação básica de campos de texto com data
			campo = document.getElementById("inputTextoData");
			valor = campo.value;

			if (!valor) {
				erros.push("Texto Data vazio!");
			} else {
				console.log("Texto Data: " + valor);
			}

			// Obtenção e validação básica de campos de texto de senha
			campo = document.getElementById("inputTextoSenha");
			valor = campo.value;

			if (!valor) {
				erros.push("Texto Senha vazio!");
			} else {
				console.log("Texto Senha: " + valor);
			}

			// Obtenção e validação básica de campos menu de opções (listas)
			campo = document.getElementById("selectOpcoes");
			// Como sabemos que os valores das opções são sempre números inteiros,
			// vamos utilizar o mesmo processo de validação de campos de texto numéricos.
			// Mas, se soubéssemos que os valores não são numéricos, bastaria utilizar
			// o mesmo processo de validação de uma caixa de texto simples! :)
			valor = parseInt(campo.value);

			if (isNaN(valor)) {
				erros.push("Menu de Opções vazio!");
			} else {
				console.log("Menu de Opções: " + valor);
			}

			// Obtenção e validação básica de caixas de seleção
			campo = document.getElementById("inputCheck");
			valor = campo.checked;
			console.log("Caixa de Seleção: " + valor);

			if (erros.length == 0) {
				console.log("Validado com sucesso!");
			} else {
				console.log('Erros:\n' + erros.join('\n'))
			}
		}

	</script>

</body>
</html>
